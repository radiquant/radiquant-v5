services:
  api:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql+asyncpg://radiquant:radiquant@db:5432/radiquant
      ALEMBIC_DATABASE_URL: postgresql+psycopg2://radiquant:radiquant@db:5432/radiquant
      SECRET_KEY: change-me-in-production-minimum-32-characters
      ACCESS_TOKEN_TTL_MINUTES: "60"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: radiquant
      POSTGRES_USER: radiquant
      POSTGRES_PASSWORD: radiquant
    volumes:
      - pgdata:/var/lib/postgresql/data

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    depends_on:
      - api
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  pgdata:
